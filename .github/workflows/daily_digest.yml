name: Daily News Digest

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Gmail token
        run: echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json

      - name: Write Gmail credentials
        run: echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > credentials.json

      - name: Initialize database
        env:
          DATABASE_PATH: data/news_digest.db
        run: |
          mkdir -p data
          python3 -m storage.db

      - name: Run pipeline
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          DIGEST_RECIPIENT: ${{ secrets.DIGEST_RECIPIENT }}
          DATABASE_PATH: data/news_digest.db
          OLLAMA_BASE_URL: ""
          OLLAMA_MODEL: ""
        run: python3 -m app.main
